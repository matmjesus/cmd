<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor HTML - Estilo VS Code Light</title>
    <style>
        /* Zera as margens e define o tamanho correto */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Estrutura principal */
        body {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #f3f3f3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Configuração das colunas */
        .pane {
            width: 50%;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .editor-pane {
            border-right: 1px solid #cccccc;
        }

        /* Barra de Abas (Tabs) / Ferramentas estilo VS Code */
        .tabs-bar {
            background-color: #ececec;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 35px;
            border-bottom: 1px solid #cccccc;
            padding-right: 10px;
        }

        .left-side, .right-side {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .right-side {
            gap: 8px; /* Espaçamento entre os botões */
        }

        /* Aba ativa */
        .tab {
            background-color: #ffffff;
            color: #333333;
            padding: 8px 15px;
            font-size: 13px;
            display: flex;
            align-items: center;
            border-top: 1px solid #007acc;
            border-right: 1px solid #cccccc;
            height: 100%;
            cursor: default;
            user-select: none;
        }

        /* Campo de Input para o nome do arquivo */
        .file-name-input {
            border: 1px solid #cccccc;
            padding: 3px 6px;
            font-size: 12px;
            border-radius: 3px;
            outline: none;
            width: 120px;
            background-color: #ffffff;
        }
        
        .file-name-input:focus {
            border-color: #007acc;
        }

        /* Estilo base dos botões */
        .btn {
            color: white;
            border: none;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }

        /* Botão de Salvar (Azul) */
        .btn-save {
            background-color: #007acc;
        }
        .btn-save:hover { background-color: #0062a3; }
        .btn-save:active { background-color: #004c80; }

        /* Botão de Limpar (Vermelho) */
        .btn-clear {
            background-color: #d9534f;
        }
        .btn-clear:hover { background-color: #c9302c; }
        .btn-clear:active { background-color: #ac2925; }

        /* Área de edição (Textarea) */
        textarea {
            flex-grow: 1;
            width: 100%;
            padding: 15px;
            font-family: Consolas, "Courier New", monospace; 
            font-size: 14px;
            line-height: 1.5;
            color: #000000;
            background-color: #ffffff;
            border: none;
            resize: none;
            outline: none;
        }

        /* Iframe do resultado */
        iframe {
            flex-grow: 1;
            width: 100%;
            background-color: #ffffff;
            border: none;
        }

        /* Responsividade para Celulares */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .pane {
                width: 100%;
                height: 50%;
            }
            .editor-pane {
                border-right: none;
                border-bottom: 2px solid #cccccc;
            }
            .file-name-input {
                width: 90px; /* Reduz um pouco no celular para caber tudo */
            }
            .tabs-bar {
                padding-right: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="pane editor-pane">
        <div class="tabs-bar">
            <div class="left-side">
                <div class="tab">
                    <span style="color: #e44d26; font-weight: bold; margin-right: 6px;">&lt;&gt;</span> Editor
                </div>
            </div>
            
            <div class="right-side">
                <input type="text" id="fileName" class="file-name-input" placeholder="Nome do arquivo..." value="index.html">
                <button class="btn btn-clear" id="clearBtn" title="Limpar todo o código">
                    🗑️ Limpar
                </button>
                <button class="btn btn-save" id="downloadBtn">
                    📥 Salvar
                </button>
            </div>
        </div>
        <textarea id="htmlCode" placeholder="Cole ou digite seu código HTML aqui..."><h1 style='color: #007acc; font-family: sans-serif;'>Olá, Mundo!</h1>
<p style='font-family: sans-serif; color: #333;'>Este é um editor estilo VS Code Claro.</p></textarea>
    </div>

    <div class="pane output-pane">
        <div class="tabs-bar">
            <div class="tab">
                <span style="color: #007acc; font-weight: bold; margin-right: 6px;">⚙</span> Preview Renderizado
            </div>
        </div>
        <iframe id="outputFrame"></iframe>
    </div>

    <script>
        const htmlCode = document.getElementById('htmlCode');
        const outputFrame = document.getElementById('outputFrame');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const fileNameInput = document.getElementById('fileName');

        // Atualiza o preview do Iframe
        function updateOutput() {
            const baseStyle = "<style>body { margin: 15px; font-family: sans-serif; }</style>";
            outputFrame.srcdoc = baseStyle + htmlCode.value;
        }

        // Função para baixar o arquivo HTML com nome personalizado
        function downloadHTML() {
            const codeToSave = htmlCode.value;
            const blob = new Blob([codeToSave], { type: 'text/html' });
            const link = document.createElement('a');
            
            // Pega o valor digitado pelo usuário e valida a extensão
            let name = fileNameInput.value.trim();
            if (!name) name = 'index.html';
            if (!name.endsWith('.html')) name += '.html'; // Garante que termine com .html

            link.download = name;
            link.href = window.URL.createObjectURL(blob);
            link.style.display = 'none';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Função para limpar a tela
        function clearScreen() {
            if (confirm("Tem certeza que deseja limpar todo o código?")) {
                htmlCode.value = "";
                updateOutput();
            }
        }

        // Eventos
        downloadBtn.addEventListener('click', downloadHTML);
        clearBtn.addEventListener('click', clearScreen);

        // Suporte para a tecla Tab criar recuo de código (2 espaços)
        htmlCode.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;

                this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 2;
                updateOutput();
            }
        });

        // Atualiza conforme digita
        htmlCode.addEventListener('input', updateOutput);
        
        // Renderização inicial
        updateOutput(); 
    </script>

</body>
</html>
