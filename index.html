<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor HTML - Estilo VS Code Light</title>
    <style>
        /* Zera as margens e define o tamanho correto */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Estrutura principal */
        body {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #f3f3f3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Configuração das colunas */
        .pane {
            width: 50%;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .editor-pane {
            border-right: 1px solid #cccccc;
        }

        /* Barra de Abas (Tabs) estilo VS Code */
        .tabs-bar {
            background-color: #ececec;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 35px;
            border-bottom: 1px solid #cccccc;
            padding-right: 10px;
        }

        /* Aba ativa */
        .tab {
            background-color: #ffffff;
            color: #333333;
            padding: 8px 15px;
            font-size: 13px;
            display: flex;
            align-items: center;
            border-top: 1px solid #007acc;
            border-right: 1px solid #cccccc;
            height: 100%;
            cursor: default;
            user-select: none;
        }

        /* Botão de Salvar / Baixar */
        .btn-save {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }

        .btn-save:hover {
            background-color: #0062a3;
        }

        .btn-save:active {
            background-color: #004c80;
        }

        /* Área de edição (Textarea) */
        textarea {
            flex-grow: 1;
            width: 100%;
            padding: 15px;
            font-family: Consolas, "Courier New", monospace; 
            font-size: 14px;
            line-height: 1.5;
            color: #000000;
            background-color: #ffffff;
            border: none;
            resize: none;
            outline: none;
        }

        /* Iframe do resultado */
        iframe {
            flex-grow: 1;
            width: 100%;
            background-color: #ffffff;
            border: none;
        }

        /* Responsividade para Celulares */
        @media (max-width: 768px) {
            body {
                flex-direction: column; /* Empilha os painéis verticalmente */
            }
            .pane {
                width: 100%;
                height: 50%; /* Metade da tela para o editor, metade para o preview */
            }
            .editor-pane {
                border-right: none;
                border-bottom: 2px solid #cccccc;
            }
        }
    </style>
</head>
<body>

    <div class="pane editor-pane">
        <div class="tabs-bar">
            <div class="tab">
                <span style="color: #e44d26; font-weight: bold; margin-right: 6px;">&lt;&gt;</span> index.html
            </div>
            <button class="btn-save" id="downloadBtn">
                📥 Salvar .html
            </button>
        </div>
        <textarea id="htmlCode" placeholder="Cole ou digite seu código HTML aqui..."><h1 style='color: #007acc; font-family: sans-serif;'>Olá, Mundo!</h1>
<p style='font-family: sans-serif; color: #333;'>Este é um editor estilo VS Code Claro.</p></textarea>
    </div>

    <div class="pane output-pane">
        <div class="tabs-bar">
            <div class="tab">
                <span style="color: #007acc; font-weight: bold; margin-right: 6px;">⚙</span> Preview Renderizado
            </div>
        </div>
        <iframe id="outputFrame"></iframe>
    </div>

    <script>
        const htmlCode = document.getElementById('htmlCode');
        const outputFrame = document.getElementById('outputFrame');
        const downloadBtn = document.getElementById('downloadBtn');

        // Atualiza o preview
        function updateOutput() {
            const baseStyle = "<style>body { margin: 15px; font-family: sans-serif; }</style>";
            outputFrame.srcdoc = baseStyle + htmlCode.value;
        }

        // Função para baixar o arquivo criado pelo usuário
        function downloadHTML() {
            const codeToSave = htmlCode.value;
            
            // Cria um "Blob" (um objeto de dados binários/texto bruto) do tipo HTML
            const blob = new Blob([codeToSave], { type: 'text/html' });
            
            // Cria um link temporário na memória
            const link = document.createElement('a');
            
            // Define o nome padrão do arquivo baixado
            link.download = 'index.html';
            
            // Aponta o link para o objeto de dados que criamos
            link.href = window.URL.createObjectURL(blob);
            
            // Garante que o link não apareça na tela
            link.style.display = 'none';
            
            // Adiciona o link no documento, simula o clique para baixar e remove o link
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Evento do botão de download
        downloadBtn.addEventListener('click', downloadHTML);

        // Suporte para a tecla Tab criar recuo de código
        htmlCode.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;

                this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 2;
                updateOutput();
            }
        });

        // Atualiza conforme digita
        htmlCode.addEventListener('input', updateOutput);
        
        // Renderização inicial
        updateOutput(); 
    </script>

</body>
</html>
