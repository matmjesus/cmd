<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor HTML - Estilo VS Code Light</title>
    <style>
        /* Zera as margens e define o tamanho correto */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Estrutura principal */
        body {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #f3f3f3; /* Cor de fundo padrão da janela do VS Code */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Configuração das colunas */
        .pane {
            width: 50%;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .editor-pane {
            border-right: 1px solid #cccccc; /* Divisória clara */
        }

        /* Barra de Abas (Tabs) estilo VS Code */
        .tabs-bar {
            background-color: #ececec;
            display: flex;
            height: 35px;
            border-bottom: 1px solid #cccccc;
        }

        /* Aba ativa (Estilo VS Code com a linhazinha azul em cima) */
        .tab {
            background-color: #ffffff;
            color: #333333;
            padding: 8px 15px;
            font-size: 13px;
            display: flex;
            align-items: center;
            border-top: 1px solid #007acc; /* Detalhe azul do VS Code */
            border-right: 1px solid #cccccc;
            cursor: default;
            user-select: none;
        }

        /* Área de edição (Textarea) */
        textarea {
            flex-grow: 1; /* Ocupa o restante do espaço da coluna */
            width: 100%;
            padding: 15px;
            /* Fonte padrão do VS Code */
            font-family: Consolas, "Courier New", monospace; 
            font-size: 14px;
            line-height: 1.5;
            color: #000000;
            background-color: #ffffff;
            border: none;
            resize: none;
            outline: none;
        }

        /* Iframe do resultado */
        iframe {
            flex-grow: 1;
            width: 100%;
            background-color: #ffffff;
            border: none;
        }
    </style>
</head>
<body>

    <div class="pane editor-pane">
        <div class="tabs-bar">
            <div class="tab">
                <span style="color: #e44d26; font-weight: bold; margin-right: 6px;">&lt;&gt;</span> index.html
            </div>
        </div>
        <textarea id="htmlCode" placeholder="Cole ou digite seu código HTML aqui...
Exemplo:
<h1 style='color: #007acc;'>Olá, Mundo!</h1>
<p>Este é um editor estilo VS Code Claro.</p>"></textarea>
    </div>

    <div class="pane output-pane">
        <div class="tabs-bar">
            <div class="tab">
                <span style="color: #007acc; font-weight: bold; margin-right: 6px;">⚙</span> Preview Renderizado
            </div>
        </div>
        <iframe id="outputFrame"></iframe>
    </div>

    <script>
        const htmlCode = document.getElementById('htmlCode');
        const outputFrame = document.getElementById('outputFrame');

        function updateOutput() {
            outputFrame.srcdoc = htmlCode.value;
        }

        // Atualiza conforme digita
        htmlCode.addEventListener('input', updateOutput);
        
        // Carrega o conteúdo inicial do placeholder se o usuário não tiver digitado nada
        // (Opcional, mas dá um efeito legal)
        updateOutput(); 
    </script>

</body>
</html>
